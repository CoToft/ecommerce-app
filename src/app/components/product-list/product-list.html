<div class="container-fluid p-0">

  <app-header></app-header>

  <!-- Navigation Bar -->
  <div class="bg-secondary text-white text-center py-2">

    <a routerLink="/"
       class="text-white text-decoration-none mx-3">
      Home
    </a>

    <a routerLink="/admin"
       class="text-white text-decoration-none mx-3">
      Admin Dashboard
    </a>

    <a routerLink="/cart"
       class="text-white text-decoration-none mx-3">
      Cart
    </a>

  </div>

  <div class="row g-0">

    <!-- Sidebar -->
    <div class="col-md-2 bg-light p-3">

      <h2 class="mb-4">Categories</h2>

      <ul class="list-group">

        <button
          class="list-group-item list-group-item-action"
          (click)="filterCategory('All')">
          All Products
        </button>

        <button
          class="list-group-item list-group-item-action"
          (click)="filterCategory('Laptops')">
          Laptops
        </button>

        <button
          class="list-group-item list-group-item-action"
          (click)="filterCategory('Phones')">
          Phones
        </button>

        <button
          class="list-group-item list-group-item-action"
          (click)="filterCategory('Accessories')">
          Accessories
        </button>

        <button
          class="list-group-item list-group-item-action"
          (click)="filterCategory('Gaming')">
          Gaming
        </button>

      </ul>

    </div>

    <!-- Main Content -->
    <div class="col-md-10 p-4">

      <!-- Banner -->
      <div class="bg-primary text-white text-center rounded p-5 mb-5">

        <h1 class="display-3 fw-bold">
          E-Commerce Store
        </h1>

        <p class="fs-3">
          Welcome to the homepage
        </p>

      </div>

      <!-- Product Cards -->
      <div class="row">

        <div
          class="col-md-4 mb-4"
          *ngFor="let product of filteredProducts">

          <div class="card h-100 shadow-sm">

            <img
              [src]="product.image"
              [alt]="product.name"
              class="card-img-top"
              style="height: 300px; object-fit: cover;"
            >

            <div class="card-body d-flex flex-column">

              <h3 class="card-title">
                {{ product.name }}
              </h3>

              <p class="card-text fs-5">
                ${{ product.price }}
              </p>

              <p class="card-text">
                Rating: {{ product.rating }}
              </p>

              <a
                [routerLink]="['/product', product.id]"
                class="btn btn-primary mt-auto">

                View Details

              </a>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>
  <app-footer></app-footer>

</div>
